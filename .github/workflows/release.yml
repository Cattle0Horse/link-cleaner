name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '>=17.5.0'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compute version
        id: ver
        run: |
          short=$(git rev-parse --short HEAD)
          stamp=$(date -u +%Y.%m.%d.%H%M)
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "version=$stamp.$short" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          SCRIPT_VERSION: ${{ steps.ver.outputs.version }}
          DOWNLOAD_URL: ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/link-cleaner.user.js
          UPDATE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/link-cleaner.meta.js
        run: npm run build

      - name: Create or update latest release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: latest
          name: Latest
          files: |
            dist/link-cleaner.user.js
            dist/link-cleaner.meta.js
          fail_on_unmatched_files: true
          overwrite_files: true
