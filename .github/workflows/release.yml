name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compute version
        id: ver
        run: |
          short=$(git rev-parse --short HEAD)
          stamp=$(date -u +%Y.%m.%d.%H%M)
          echo "short=$short" >> "$GITHUB_OUTPUT"
          echo "version=$stamp.$short" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          SCRIPT_VERSION: ${{ steps.ver.outputs.version }}
          DOWNLOAD_URL: ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/link-cleaner.user.js
          UPDATE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/latest/download/link-cleaner.meta.js
        run: npm run build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.ver.outputs.short }}
          name: build-${{ steps.ver.outputs.short }}
          files: |
            dist/link-cleaner.user.js
            dist/link-cleaner.meta.js
          generate_release_notes: true
          fail_on_unmatched_files: true
